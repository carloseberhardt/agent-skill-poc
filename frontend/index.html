<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solis Runtime</title>

<!-- IBM Plex Sans -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap">

<!-- Carbon Web Components (esm.sh resolves transitive deps like tslib) -->
<script type="module" src="https://esm.sh/@carbon/web-components@2.15.0/es/components/button/index.js"></script>
<!-- tag replaced with native styled spans -->
<script type="module" src="https://esm.sh/@carbon/web-components@2.15.0/es/components/text-input/index.js"></script>
<script type="module" src="https://esm.sh/@carbon/web-components@2.15.0/es/components/textarea/index.js"></script>
<script type="module" src="https://esm.sh/@carbon/web-components@2.15.0/es/components/notification/index.js"></script>

<style>
  /* ── Carbon tokens (subset) ───────────────────────────────── */
  :root {
    --cds-background:           #161616;
    --cds-background-hover:     #262626;
    --cds-layer-01:             #262626;
    --cds-layer-02:             #393939;
    --cds-layer-accent-01:      #393939;
    --cds-border-subtle-00:     #393939;
    --cds-border-subtle-01:     #525252;
    --cds-text-primary:         #f4f4f4;
    --cds-text-secondary:       #c6c6c6;
    --cds-text-placeholder:     #6f6f6f;
    --cds-text-disabled:        #525252;
    --cds-interactive:          #4589ff;
    --cds-focus:                #ffffff;
    --cds-support-success:      #42be65;
    --cds-support-warning:      #f1c21b;
    --cds-support-error:        #fa4d56;
    --cds-support-info:         #4589ff;
    --cds-link-primary:         #78a9ff;
    --ibm-blue-60:              #0f62fe;
    --ibm-blue-40:              #78a9ff;
    --ibm-gray-90:              #262626;
    --ibm-gray-80:              #393939;
    --ibm-gray-70:              #525252;
    --ibm-gray-50:              #8d8d8d;
    --ibm-gray-30:              #c6c6c6;
    --ibm-gray-10:              #f4f4f4;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    background: var(--cds-background);
    color: var(--cds-text-primary);
    overflow: hidden;
  }

  /* ── Shell header ─────────────────────────────────────────── */
  .shell-header {
    height: 48px;
    background: #000000;
    border-bottom: 1px solid var(--ibm-gray-80);
    display: flex;
    align-items: center;
    padding: 0 16px;
    flex-shrink: 0;
    gap: 12px;
    z-index: 100;
  }
  .shell-header .product-name {
    font-size: 14px;
    font-weight: 400;
    color: var(--cds-text-primary);
    letter-spacing: 0.1px;
  }
  .shell-header .product-name span {
    color: var(--ibm-gray-50);
    font-weight: 300;
  }
  .shell-header .divider {
    width: 1px;
    height: 16px;
    background: var(--ibm-gray-70);
  }
  .shell-header .env-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--ibm-gray-50);
    background: var(--ibm-gray-90);
    padding: 2px 8px;
    border: 1px solid var(--ibm-gray-80);
  }
  .shell-header .runtime-status {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--ibm-gray-50);
  }
  .status-indicator {
    width: 8px;
    height: 8px;
    background: var(--cds-support-success);
  }
  .status-indicator.offline { background: var(--cds-support-error); }

  /* ── Body layout ──────────────────────────────────────────── */
  .body {
    flex: 1;
    display: flex;
    overflow: hidden;
    position: relative;
  }

  /* ── Left nav ─────────────────────────────────────────────── */
  .sidenav {
    width: 256px;
    background: var(--cds-layer-01);
    border-right: 1px solid var(--cds-border-subtle-00);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow: hidden;
  }
  .sidenav-header {
    padding: 16px;
    border-bottom: 1px solid var(--cds-border-subtle-00);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .sidenav-header h2 {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--ibm-gray-30);
  }
  .sidenav-skills {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }
  .skill-item {
    padding: 12px 16px;
    border-bottom: 1px solid var(--cds-border-subtle-00);
    cursor: default;
    transition: background 70ms;
  }
  .skill-item:hover { background: var(--cds-background-hover); }
  .skill-item-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 4px;
  }
  .skill-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--cds-text-primary);
    font-family: 'IBM Plex Mono', monospace;
  }
  .skill-desc {
    font-size: 12px;
    color: var(--ibm-gray-50);
    line-height: 1.4;
    margin-bottom: 8px;
  }
  .skill-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 6px;
  }
  .skill-trigger-info {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--ibm-gray-50);
  }

  /* Trigger tags (plain spans styled like Carbon tags) */
  .trigger-tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.2px;
    padding: 2px 8px;
    border-radius: 24px;
    white-space: nowrap;
  }
  .trigger-tag.blue       { background: #d0e2ff; color: #0043ce; }
  .trigger-tag.green      { background: #defbe6; color: #0e6027; }
  .trigger-tag.warm-gray  { background: #e0e0e0; color: #393939; }

  .sidenav-footer {
    padding: 12px 16px;
    border-top: 1px solid var(--cds-border-subtle-00);
  }

  /* ── Main content ─────────────────────────────────────────── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    background: var(--cds-background);
  }
  .main-toolbar {
    height: 48px;
    border-bottom: 1px solid var(--cds-border-subtle-00);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 12px;
    flex-shrink: 0;
    background: var(--cds-layer-01);
  }
  .main-toolbar h1 {
    font-size: 14px;
    font-weight: 400;
    color: var(--ibm-gray-30);
  }
  .main-toolbar .spacer { flex: 1; }
  .content-area {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .content-area:empty::after {
    content: "Run a skill to see results here.";
    color: var(--ibm-gray-70);
    font-size: 13px;
    font-style: italic;
  }

  /* Chat input */
  .chat-bar {
    border-top: 1px solid var(--cds-border-subtle-00);
    background: var(--cds-layer-01);
    padding: 12px 16px;
    display: none;
    align-items: center;
    gap: 8px;
  }
  .chat-bar.visible { display: flex; }
  .chat-bar input {
    flex: 1;
    background: var(--cds-background);
    border: 1px solid var(--ibm-gray-70);
    border-bottom: 2px solid var(--ibm-gray-50);
    color: var(--cds-text-primary);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px;
    padding: 10px 16px;
    outline: none;
    transition: border-color 70ms;
  }
  .chat-bar input::placeholder { color: var(--cds-text-placeholder); }
  .chat-bar input:focus {
    border-color: var(--cds-focus);
    border-bottom-color: var(--cds-focus);
    outline: 2px solid var(--cds-focus);
    outline-offset: -2px;
  }

  /* ── Chat bubbles ─────────────────────────────────────────── */
  .bubble {
    max-width: 72%;
    padding: 10px 16px;
    font-size: 14px;
    line-height: 1.6;
  }
  .bubble-user {
    background: var(--ibm-blue-60);
    color: #ffffff;
    align-self: flex-end;
  }
  .bubble-assistant {
    background: var(--cds-layer-02);
    color: var(--cds-text-primary);
    border-left: 2px solid var(--ibm-gray-70);
    align-self: flex-start;
  }

  /* ── Result cards ─────────────────────────────────────────── */
  .result-card {
    background: var(--cds-layer-01);
    border: 1px solid var(--cds-border-subtle-00);
    border-left: 3px solid var(--ibm-blue-60);
    padding: 20px 24px;
  }
  .result-card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .result-card h3 {
    font-size: 14px;
    font-weight: 600;
    color: var(--cds-text-primary);
    line-height: 1.3;
  }
  .result-card .skill-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--ibm-gray-50);
    white-space: nowrap;
    margin-left: 12px;
    flex-shrink: 0;
  }
  .result-card ul {
    margin: 0 0 12px 16px;
    font-size: 13px;
    line-height: 1.8;
    color: var(--ibm-gray-30);
  }
  .result-card .meta {
    font-size: 11px;
    color: var(--ibm-gray-70);
    font-family: 'IBM Plex Mono', monospace;
    border-top: 1px solid var(--cds-border-subtle-00);
    padding-top: 8px;
    margin-top: 4px;
  }

  /* Approval card */
  .result-card.approval {
    border-left-color: var(--cds-support-warning);
    background: #1c1a00;
    border-color: #3d3300;
  }
  .result-card.approval h3 { color: var(--cds-support-warning); }
  .action-desc {
    background: #2a2500;
    border: 1px solid #3d3300;
    padding: 10px 14px;
    margin: 10px 0;
    font-size: 13px;
    color: var(--cds-support-warning);
    font-family: 'IBM Plex Mono', monospace;
  }
  .action-bar {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }

  /* ── Right pane — activity feed + event emitter (collapsible) ── */
  .event-pane {
    width: 300px;
    background: var(--cds-layer-01);
    border-left: 1px solid var(--cds-border-subtle-00);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    transition: width 150ms ease, opacity 150ms ease;
    overflow: hidden;
  }
  .event-pane.collapsed {
    width: 0;
    border-left: none;
  }
  .event-pane-toggle {
    position: absolute;
    right: 0;
    top: 49px;
    width: 28px;
    height: 28px;
    background: var(--cds-layer-01);
    border: 1px solid var(--cds-border-subtle-00);
    border-right: none;
    color: var(--ibm-gray-50);
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
    transition: background 70ms;
  }
  .event-pane-toggle:hover {
    background: var(--cds-background-hover);
    color: var(--cds-text-primary);
  }
  .event-pane-header {
    height: 48px;
    border-bottom: 1px solid var(--cds-border-subtle-00);
    padding: 0 16px;
    display: flex;
    align-items: center;
    min-width: 300px;
  }
  .event-pane-header h2 {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--ibm-gray-30);
  }
  .event-pane-body {
    padding: 0;
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 300px;
    overflow: hidden;
  }

  /* Activity feed */
  .activity-feed {
    flex: 1;
    overflow-y: auto;
    padding: 8px 12px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .activity-feed:empty::after {
    content: "Activity will appear here as the runtime processes events, triggers skills, and calls tools.";
    color: var(--ibm-gray-70);
    font-size: 11px;
    font-style: italic;
    padding: 8px 0;
  }
  .activity-item {
    font-size: 11px;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--ibm-gray-30);
    padding: 4px 8px;
    border-left: 2px solid var(--ibm-gray-70);
    line-height: 1.4;
  }
  .activity-item .activity-time {
    color: var(--ibm-gray-50);
    margin-right: 6px;
  }
  .activity-item.cat-event  { border-left-color: var(--cds-support-warning); }
  .activity-item.cat-skill  { border-left-color: var(--cds-support-info); }
  .activity-item.cat-tool   { border-left-color: var(--cds-support-success); }
  .activity-item.cat-agent  { border-left-color: #be95ff; }

  /* Fire events section at bottom */
  .fire-events-section {
    padding: 12px 16px;
    border-top: 1px solid var(--cds-border-subtle-00);
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-width: 300px;
  }
  .form-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--ibm-gray-30);
    display: block;
    margin-bottom: 4px;
  }
  .carbon-input {
    width: 100%;
    background: var(--cds-background);
    border: none;
    border-bottom: 1px solid var(--ibm-gray-70);
    color: var(--cds-text-primary);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    padding: 8px 12px;
    outline: none;
    transition: border-color 70ms;
  }
  .carbon-input:focus {
    border-bottom-color: var(--cds-focus);
    outline: 2px solid var(--cds-focus);
    outline-offset: -2px;
  }
  textarea.carbon-input {
    height: 96px;
    resize: vertical;
    border: 1px solid var(--ibm-gray-70);
    border-bottom: 1px solid var(--ibm-gray-70);
  }
  .event-flash {
    font-size: 12px;
    color: var(--cds-support-success);
    font-family: 'IBM Plex Mono', monospace;
    min-height: 16px;
  }

  /* Skill definition viewer modal */
  .skill-modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .skill-modal {
    background: var(--cds-layer-01);
    border: 1px solid var(--cds-border-subtle-00);
    width: 600px;
    max-height: 80vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .skill-modal-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--cds-border-subtle-00);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .skill-modal-header h3 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    font-weight: 500;
  }
  .skill-modal-close {
    background: none;
    border: none;
    color: var(--ibm-gray-50);
    font-size: 18px;
    cursor: pointer;
    padding: 4px 8px;
  }
  .skill-modal-close:hover { color: var(--cds-text-primary); }
  .skill-modal-body {
    padding: 20px;
    overflow-y: auto;
    flex: 1;
  }
  .skill-modal-body pre {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    line-height: 1.6;
    color: var(--ibm-gray-30);
    white-space: pre-wrap;
    word-break: break-word;
  }
  .skill-modal-body .config-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--ibm-gray-50);
    margin-top: 16px;
    margin-bottom: 4px;
  }

  /* ── Scrollbar ────────────────────────────────────────────── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--ibm-gray-70); }
  ::-webkit-scrollbar-thumb:hover { background: var(--ibm-gray-50); }
</style>
</head>
<body>

<!-- Shell header -->
<header class="shell-header">
  <svg width="20" height="20" viewBox="0 0 32 32" fill="white" xmlns="http://www.w3.org/2000/svg">
    <path d="M16 2C8.268 2 2 8.268 2 16s6.268 14 14 14 14-6.268 14-14S23.732 2 16 2zm0 2c6.627 0 12 5.373 12 12S22.627 28 16 28 4 22.627 4 16 9.373 4 16 4zm-1 4v8.586l-3.293-3.293-1.414 1.414L16 20.414l5.707-5.707-1.414-1.414L17 16.586V8h-2z"/>
  </svg>
  <span class="product-name">Solis <span>/ Runtime</span></span>
  <div class="divider"></div>
  <span class="env-badge" id="env-badge">...</span>
  <div class="runtime-status">
    <div class="status-indicator" id="status-dot"></div>
    <span id="uptime">Connecting...</span>
  </div>
</header>

<!-- Body -->
<div class="body">

  <!-- Left: Skills nav -->
  <nav class="sidenav">
    <div class="sidenav-header">
      <h2>Skills</h2>
    </div>
    <div class="sidenav-skills" id="skills-list"></div>
    <div class="sidenav-footer">
      <cds-button id="reload-btn" kind="ghost" size="sm" style="width:100%" onclick="reloadSkills()">
        Reload Skills
      </cds-button>
    </div>
  </nav>

  <!-- Center: Content -->
  <main class="main">
    <div class="main-toolbar">
      <h1>Skill Output</h1>
      <span class="spacer"></span>
      <cds-button kind="danger--ghost" size="sm" onclick="clearContent()">Clear</cds-button>
    </div>
    <div class="content-area" id="content"></div>
    <div class="chat-bar" id="chat-bar">
      <input type="text" id="chat-input" placeholder="Message the chat skill..." autocomplete="off" />
      <cds-button size="md" onclick="sendChat()">Send</cds-button>
    </div>
  </main>

  <!-- Right: Activity feed + event emitter (expanded by default) -->
  <button class="event-pane-toggle" id="event-toggle" onclick="toggleEventPane()" title="Activity Feed">&#9654;</button>
  <aside class="event-pane" id="event-pane">
    <div class="event-pane-header">
      <h2>Activity</h2>
    </div>
    <div class="event-pane-body">
      <div class="activity-feed" id="activity-feed"></div>
      <div class="fire-events-section">
        <div id="event-buttons"></div>
        <div>
          <label class="form-label" for="event-name">Custom Event</label>
          <input class="carbon-input" type="text" id="event-name" placeholder="event_name" />
          <cds-button kind="ghost" size="sm" style="width:100%;margin-top:6px" onclick="fireEvent()">Fire</cds-button>
        </div>
        <div class="event-flash" id="event-flash"></div>
      </div>
    </div>
  </aside>

</div>

<script>
const content = document.getElementById("content");

// ── SSE ───────────────────────────────────────────────────────
const evtSource = new EventSource("/events");
evtSource.addEventListener("skill_result", (e) => {
  renderResult(JSON.parse(e.data));
});
evtSource.addEventListener("activity", (e) => {
  renderActivity(JSON.parse(e.data));
});
evtSource.onerror = () => {
  document.getElementById("status-dot").classList.add("offline");
};

// ── Skills ────────────────────────────────────────────────────
async function loadSkills() {
  const resp = await fetch("/skills");
  const skills = await resp.json();
  const container = document.getElementById("skills-list");
  container.innerHTML = "";
  skills.forEach(s => {
    const tagType = s.trigger === "scheduled" ? "green"
                  : s.trigger === "event"     ? "warm-gray"
                  :                             "blue";
    const div = document.createElement("div");
    div.className = "skill-item";
    div.innerHTML = `
      <div class="skill-item-header">
        <span class="skill-name">${s.name}</span>
        <span class="trigger-tag ${tagType}">${s.trigger}</span>
      </div>
      <div class="skill-desc">${s.description}</div>
      <div class="skill-meta">
        <span class="skill-trigger-info">${s.trigger_config || ""}</span>
        <span>
          <cds-button kind="ghost" size="sm" onclick="viewSkillDef('${s.name}')" title="View definition" style="min-width:0;padding:0 6px">&#123;&#125;</cds-button>
          <cds-button kind="ghost" size="sm" onclick="invokeSkill('${s.name}')">Run</cds-button>
        </span>
      </div>
    `;
    container.appendChild(div);
  });
  buildEventButtons(skills);
}

async function reloadSkills() {
  const btn = document.getElementById("reload-btn");
  btn.textContent = "Reloading...";
  btn.disabled = true;
  try {
    const resp = await fetch("/reload-skills", { method: "POST" });
    const data = await resp.json();
    await loadSkills();
    await updateStatus();
    btn.textContent = `Done — ${data.skills_loaded} skills`;
    setTimeout(() => { btn.textContent = "Reload Skills"; btn.disabled = false; }, 3000);
  } catch {
    btn.textContent = "Reload failed";
    setTimeout(() => { btn.textContent = "Reload Skills"; btn.disabled = false; }, 3000);
  }
}

// ── Invoke ────────────────────────────────────────────────────
let chatActive = false;

async function invokeSkill(name) {
  if (name === "chat") {
    if (!chatActive) {
      chatActive = true;
      document.getElementById("chat-bar").classList.add("visible");
      document.getElementById("chat-input").focus();
    }
    return;
  }
  const resp = await fetch(`/invoke/${name}`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: "{}"
  });
  renderResult(await resp.json());
}

async function clearContent() {
  content.innerHTML = "";
  document.getElementById("activity-feed").innerHTML = "";
  chatActive = false;
  document.getElementById("chat-bar").classList.remove("visible");
  await fetch("/clear", { method: "POST" });
}

// ── Chat ──────────────────────────────────────────────────────
async function sendChat() {
  const input = document.getElementById("chat-input");
  const msg = input.value.trim();
  if (!msg) return;
  input.value = "";

  const userBubble = document.createElement("div");
  userBubble.className = "bubble bubble-user";
  userBubble.textContent = msg;
  content.appendChild(userBubble);
  content.scrollTop = content.scrollHeight;

  const resp = await fetch("/invoke/chat", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ input: msg }),
  });
  const result = await resp.json();

  const assistBubble = document.createElement("div");
  assistBubble.className = "bubble bubble-assistant";
  assistBubble.innerHTML = simpleMarkdown(result.content?.message || JSON.stringify(result));
  content.appendChild(assistBubble);
  content.scrollTop = content.scrollHeight;
}

document.getElementById("chat-input").addEventListener("keydown", (e) => {
  if (e.key === "Enter") sendChat();
});

function simpleMarkdown(text) {
  return text
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/`([^`]+)`/g, "<code style='font-family:IBM Plex Mono,monospace;font-size:12px;background:rgba(255,255,255,0.08);padding:1px 5px'>$1</code>")
    .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
    .replace(/\*(.+?)\*/g, "<em>$1</em>")
    .replace(/^\d+\.\s+(.+)$/gm, "<li>$1</li>")
    .replace(/^[-*]\s+(.+)$/gm, "<li>$1</li>")
    .replace(/(<li>.*<\/li>)/gs, "<ul>$1</ul>")
    .replace(/<\/ul>\s*<ul>/g, "")
    .replace(/\n{2,}/g, "<br><br>")
    .replace(/\n/g, "<br>");
}

// ── Render ────────────────────────────────────────────────────
function renderResult(result) {
  if (result.ui_type === "chat") {
    const bubble = document.createElement("div");
    bubble.className = "bubble bubble-assistant";
    bubble.innerHTML = simpleMarkdown(result.content?.message || "");
    content.appendChild(bubble);
  } else if (result.ui_type === "card") {
    content.appendChild(makeCard(result));
  } else if (result.ui_type === "approval") {
    content.appendChild(makeApprovalCard(result));
  }
  content.scrollTop = content.scrollHeight;
}

function makeCard(result) {
  const c = result.content;
  const prov = makeProvenance(result);
  const div = document.createElement("div");
  div.className = "result-card";
  div.innerHTML = `
    <div class="result-card-header">
      <h3>${c.title || result.skill_name}</h3>
      <span class="skill-label">${result.skill_name}</span>
    </div>
    <ul>${(c.bullets || []).map(b => `<li>${b}</li>`).join("")}</ul>
    <div class="meta">${prov}${c.timestamp || ""}${c.model ? " · model: " + c.model : ""}${c.sources ? " · " + c.sources.join(", ") : ""}</div>
  `;
  return div;
}

function makeApprovalCard(result) {
  const c = result.content;
  const payload = c.action_payload || {};
  const prov = makeProvenance(result);
  const div = document.createElement("div");
  div.className = "result-card approval";
  div.dataset.actionPayload = JSON.stringify(payload);
  div.dataset.skillName = result.skill_name;
  div.innerHTML = `
    <div class="result-card-header">
      <h3>${c.title || result.skill_name}</h3>
      <span class="skill-label">${result.skill_name}</span>
    </div>
    <ul>${(c.bullets || []).map(b => `<li>${b}</li>`).join("")}</ul>
    ${c.action ? `<div class="action-desc">→ ${c.action}</div>` : ""}
    <div class="action-bar">
      <cds-button kind="primary" size="sm" onclick="handleApproval('confirm', this)">Approve</cds-button>
      <cds-button kind="danger" size="sm" onclick="handleApproval('reject', this)">Reject</cds-button>
    </div>
    <div class="meta">${prov}${c.timestamp || ""}${c.model ? " · model: " + c.model : ""}${c.sources ? " · " + c.sources.join(", ") : ""}</div>
  `;
  return div;
}

function makeProvenance(result) {
  if (!result.trigger_type || result.trigger_type === "manual") return "";
  const label = result.trigger_type === "event"
    ? `Triggered by: event ${result.trigger_source || ""}`
    : `Triggered by: ${result.trigger_type}${result.trigger_source ? " " + result.trigger_source : ""}`;
  return `<span style="color:var(--cds-support-info);margin-right:8px">${label}</span> · `;
}

function handleApproval(decision, btn) {
  const card = btn.closest(".result-card");
  const bar = card.querySelector(".action-bar");
  const title = card.querySelector("h3")?.textContent || "";
  const actionDesc = card.querySelector(".action-desc")?.textContent?.replace("→ ", "") || "";
  const payload = JSON.parse(card.dataset.actionPayload || "{}");
  const skillName = card.dataset.skillName || "";
  const color = decision === "confirm" ? "var(--cds-support-success)" : "var(--cds-support-error)";
  const label = decision === "confirm" ? "Approved ✓" : "Rejected ✗";
  bar.innerHTML = `<span style="font-size:12px;font-family:'IBM Plex Mono',monospace;color:${color}">${label} — sending to agent...</span>`;
  fetch("/action", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      decision: decision === "confirm" ? "confirmed" : "rejected",
      action: payload.description || actionDesc,
      target_agent: payload.target_agent || "",
      skill_name: skillName,
      title,
    }),
  }).then(resp => {
    bar.innerHTML = `<span style="font-size:12px;font-family:'IBM Plex Mono',monospace;color:${color}">${label} — ${resp.ok ? "logged" : "failed"}</span>`;
  });
}

// ── Activity feed ─────────────────────────────────────────────
const MAX_ACTIVITY = 50;
function renderActivity(item) {
  const feed = document.getElementById("activity-feed");
  const div = document.createElement("div");
  const cat = item.category || "info";
  div.className = `activity-item cat-${cat}`;
  const ts = new Date(item.timestamp);
  const time = ts.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" });
  div.innerHTML = `<span class="activity-time">${time}</span>${item.message}`;
  feed.appendChild(div);
  // Cap at MAX_ACTIVITY items
  while (feed.children.length > MAX_ACTIVITY) feed.removeChild(feed.firstChild);
  feed.scrollTop = feed.scrollHeight;
}

// ── Fire event ────────────────────────────────────────────────
async function fireEvent(eventName) {
  const name = eventName || document.getElementById("event-name").value;
  if (!name) return;
  await fetch(`/event/${name}`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: "{}",
  });
  const flash = document.getElementById("event-flash");
  flash.textContent = `↑ "${name}" emitted`;
  setTimeout(() => flash.textContent = "", 4000);
}

function buildEventButtons(skills) {
  const container = document.getElementById("event-buttons");
  const eventSkills = skills.filter(s => s.trigger === "event" && s.trigger_config);
  if (!eventSkills.length) {
    container.innerHTML = '<span style="font-size:12px;color:var(--ibm-gray-50)">No event-driven skills loaded</span>';
    return;
  }
  container.innerHTML = eventSkills.map(s =>
    `<cds-button kind="tertiary" size="sm" style="width:100%;margin-bottom:6px" onclick="fireEvent('${s.trigger_config}')">
      ${s.trigger_config}
      <span style="font-size:10px;color:var(--ibm-gray-50);margin-left:8px">→ ${s.name}</span>
    </cds-button>`
  ).join("");
}

// ── Skill definition viewer ───────────────────────────────────
async function viewSkillDef(name) {
  const resp = await fetch(`/skills/${name}/definition`);
  const data = await resp.json();
  const overlay = document.createElement("div");
  overlay.className = "skill-modal-overlay";
  overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
  const configHtml = data.runtime_config
    ? `<div class="config-label">runtime.config.json</div><pre>${JSON.stringify(data.runtime_config, null, 2)}</pre>`
    : "";
  overlay.innerHTML = `
    <div class="skill-modal">
      <div class="skill-modal-header">
        <h3>${name}/SKILL.md</h3>
        <button class="skill-modal-close" onclick="this.closest('.skill-modal-overlay').remove()">&times;</button>
      </div>
      <div class="skill-modal-body">
        <pre>${(data.skill_md || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}</pre>
        ${configHtml}
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
}

// ── Status ────────────────────────────────────────────────────
async function updateStatus() {
  try {
    const resp = await fetch("/status");
    const data = await resp.json();
    const s = Math.round(data.uptime_seconds);
    const uptime = s < 60 ? `${s}s` : s < 3600 ? `${Math.floor(s/60)}m ${s%60}s` : `${Math.floor(s/3600)}h`;
    document.getElementById("uptime").textContent = `${data.skills_loaded} skills · up ${uptime}`;
    document.getElementById("env-badge").textContent = data.model || "model unknown";
    document.getElementById("status-dot").classList.remove("offline");
  } catch {
    document.getElementById("status-dot").classList.add("offline");
    document.getElementById("uptime").textContent = "disconnected";
  }
}

function toggleEventPane() {
  const pane = document.getElementById("event-pane");
  const btn = document.getElementById("event-toggle");
  pane.classList.toggle("collapsed");
  btn.innerHTML = pane.classList.contains("collapsed") ? "&#9664;" : "&#9654;";
}

loadSkills();
updateStatus();
setInterval(updateStatus, 10000);
</script>

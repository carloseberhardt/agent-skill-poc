services:
  agent-gateway:
    image: ghcr.io/agentgateway/agentgateway:v1.0.1
    container_name: agent-gateway
    ports:
      - "3000:3000"    # A2A + MCP listener
      - "4000:4000"    # LLM listener (replaces LiteLLM)
      - "15000:15000"  # Admin UI
    volumes:
      - ./config.yaml:/config.yaml:z
    command: ["-f", "/config.yaml"]
    env_file:
      - ../../.env
    environment:
      ADMIN_ADDR: "0.0.0.0:15000"
      AWS_DEFAULT_REGION: "us-east-1"
    security_opt:
      - label=disable
    extra_hosts:
      - "host.docker.internal:host-gateway"

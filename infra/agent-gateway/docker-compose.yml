services:
  agent-gateway:
    image: ghcr.io/agentgateway/agentgateway:0.12.0
    container_name: agent-gateway
    ports:
      - "3000:3000"    # A2A + MCP listener
      - "15000:15000"  # Admin UI
    volumes:
      - ./config.yaml:/config.yaml:ro,Z
    command: ["-f", "/config.yaml"]
    environment:
      ADMIN_ADDR: "0.0.0.0:15000"
    extra_hosts:
      - "host.docker.internal:host-gateway"

# Agent Gateway config — unified A2A, MCP, and LLM routing
# A2A agents: data-agent (5001), security-agent (5002), delivery-agent (5006)
# MCP servers: cost-api (5003), employee-lookup (5004), discord-notifier (5005)
# LLM models: /bedrock → Mistral Large (Bedrock), /watsonx → GPT-OSS-120B (WatsonX)

binds:
  # --- A2A + MCP routing ---
  - port: 3000
    listeners:
      - name: main
        protocol: HTTP
        routes:
          - name: data-agent
            matches:
              - path:
                  pathPrefix: /data-agent
            backends:
              - host: host.docker.internal:5001
            policies:
              cors:
                allowOrigins: ["*"]
                allowHeaders: [content-type, cache-control]
              a2a: {}
              urlRewrite:
                path:
                  prefix: /

          - name: security-agent
            matches:
              - path:
                  pathPrefix: /security-agent
            backends:
              - host: host.docker.internal:5002
            policies:
              cors:
                allowOrigins: ["*"]
                allowHeaders: [content-type, cache-control]
              a2a: {}
              urlRewrite:
                path:
                  prefix: /

          - name: delivery-agent
            matches:
              - path:
                  pathPrefix: /delivery-agent
            backends:
              - host: host.docker.internal:5006
            policies:
              cors:
                allowOrigins: ["*"]
                allowHeaders: [content-type, cache-control]
              a2a: {}
              urlRewrite:
                path:
                  prefix: /

          - name: mcp-tools
            matches:
              - path:
                  pathPrefix: /mcp
            backends:
              - mcp:
                  targets:
                    - name: cost-api
                      mcp:
                        host: http://host.docker.internal:5003/mcp
                    - name: employee-lookup
                      mcp:
                        host: http://host.docker.internal:5004/mcp
                    - name: discord-notifier
                      mcp:
                        host: http://host.docker.internal:5005/mcp
            policies:
              cors:
                allowOrigins: ["*"]
                allowHeaders: [content-type, cache-control, mcp-protocol-version]
                exposeHeaders: [Mcp-Session-Id]

  # --- LLM routing (replaces LiteLLM proxy) ---
  - port: 4000
    listeners:
      - name: llm
        protocol: HTTP
        routes:
          - name: bedrock
            matches:
              - path:
                  pathPrefix: /bedrock
            backends:
              - ai:
                  name: mistral-large-bedrock
                  provider:
                    bedrock:
                      model: mistral.mistral-large-3-675b-instruct
                      region: us-east-1
            policies:
              cors:
                allowOrigins: ["*"]
                allowHeaders: ["*"]
              urlRewrite:
                path:
                  prefix: /

          - name: watsonx
            matches:
              - path:
                  pathPrefix: /watsonx
            backends:
              - ai:
                  name: opengpt-watsonx
                  hostOverride: "us-south.ml.cloud.ibm.com:443"
                  pathOverride: "/ml/v1/chat/completions?version=2024-05-31"
                  provider:
                    openAI:
                      model: openai/gpt-oss-120b
                  policies:
                    backendAuth:
                      key: "$WATSONX_API_KEY"
                    backendTLS: {}
            policies:
              cors:
                allowOrigins: ["*"]
                allowHeaders: ["*"]
              urlRewrite:
                path:
                  prefix: /
              # WatsonX requires project_id in the request body (not URL or header).
              # This CEL transformation injects it into every LLM request.
              # Not visible in the Agent Gateway UI — runs at request time.
              ai:
                transformations:
                  project_id: "'$WATSONX_PROJECT_ID'"

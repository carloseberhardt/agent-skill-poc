# Agent Gateway config — routes A2A agents and MCP tool servers
# A2A agents: data-agent (5001), security-agent (5002), ops-agent (5006)
# MCP servers: cost-api (5003), employee-lookup (5004), discord-notifier (5005)

binds:
  - port: 3000
    listeners:
      - name: main
        protocol: HTTP
        routes:
          # --- A2A: data-agent ---
          - name: data-agent
            matches:
              - path:
                  pathPrefix: /data-agent
            policies:
              cors:
                allowOrigins: ["*"]
                allowHeaders: [content-type, cache-control]
              a2a: {}
              urlRewrite:
                path:
                  prefix: /
            backends:
              - host: host.docker.internal:5001

          # --- A2A: security-agent ---
          - name: security-agent
            matches:
              - path:
                  pathPrefix: /security-agent
            policies:
              cors:
                allowOrigins: ["*"]
                allowHeaders: [content-type, cache-control]
              a2a: {}
              urlRewrite:
                path:
                  prefix: /
            backends:
              - host: host.docker.internal:5002

          # --- A2A: ops-agent ---
          - name: ops-agent
            matches:
              - path:
                  pathPrefix: /ops-agent
            policies:
              cors:
                allowOrigins: ["*"]
                allowHeaders: [content-type, cache-control]
              a2a: {}
              urlRewrite:
                path:
                  prefix: /
            backends:
              - host: host.docker.internal:5006

          # --- MCP tool federation ---
          - name: mcp-tools
            matches:
              - path:
                  pathPrefix: /mcp
            policies:
              cors:
                allowOrigins: ["*"]
                allowHeaders: [content-type, cache-control, mcp-protocol-version]
                exposeHeaders: [Mcp-Session-Id]
            backends:
              - mcp:
                  targets:
                    - name: cost-api
                      mcp:
                        host: http://host.docker.internal:5003/mcp
                    - name: employee-lookup
                      mcp:
                        host: http://host.docker.internal:5004/mcp
                    - name: discord-notifier
                      mcp:
                        host: http://host.docker.internal:5005/mcp
